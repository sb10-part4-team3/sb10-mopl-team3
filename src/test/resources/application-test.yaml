spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:mopl-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

aws:
  s3:
    bucket: test-bucket
    region: us-east-1
    credentials:
      access-key: test-key
      secret-key: test-secret