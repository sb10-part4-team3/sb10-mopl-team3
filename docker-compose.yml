version: '3.8'

services:
  postgres-local:
    image: postgres:16
    container_name: mopl-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: mopl
      POSTGRES_USER: mopl
      POSTGRES_PASSWORD: mopl1234
    ports:
      - "5432:5432"
    volumes:
      - mopl-pgdata-local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mopl -d mopl"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-dev:
    image: postgres:16
    container_name: mopl-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: mopl
      POSTGRES_USER: mopl
      POSTGRES_PASSWORD: mopl1234
    ports:
      - "5433:5432"
    volumes:
      - mopl-pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mopl -d mopl"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mopl-pgdata-local:
  mopl-pgdata-dev: