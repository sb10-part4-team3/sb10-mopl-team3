services:
  postgres:
    image: postgres:16
    container_name: mopl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mopl}
      POSTGRES_USER: ${POSTGRES_USER:-mopl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mopl-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mopl} -d ${POSTGRES_DB:-mopl}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mopl-pgdata: